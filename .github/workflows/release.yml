# Publish the `codesweep` wheel (installing the `sweep` binary) to PyPI
# on version tags, via maturin and PyPI trusted publishing (OIDC — no
# API token stored in the repo; configure the trusted publisher on PyPI
# for repo hmsgit/sweep, workflow release.yml, environment pypi).

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  wheels:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: aarch64
          - runner: macos-14
            target: universal2-apple-darwin
          - runner: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.runner }}-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v5
        with:
          name: sdist
          path: dist

  publish:
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub release
        run: |
          python3 scripts/release_notes.py "$GITHUB_REF_NAME" > notes.md
          prerelease=""
          case "$GITHUB_REF_NAME" in
            *b*|*rc*) prerelease="--prerelease" ;;
          esac
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md \
            --verify-tag \
            $prerelease
        env:
          GH_TOKEN: ${{ github.token }}
